name: Scheduled VPN Config Update

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update-configs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x ./scripts/update_happ.sh

      - name: Run Happ auto-update script
        id: run_script
        # Разрешаем скрипту падать с ошибкой, но мы всё равно сохраним артефакты
        continue-on-error: true
        run: ./scripts/update_happ.sh

      - name: Upload logs and screenshots
        uses: actions/upload-artifact@v4
        if: always()  # Загружать всегда, независимо от успеха/падения
        with:
          name: debug-artifacts
          path: |
            /tmp/happ-*.png
            /tmp/happ-setup.log
            /tmp/xvfb.log

      - name: Fail job if script failed
        if: steps.run_script.outcome == 'failure'
        run: exit 1
