name: Scheduled VPN Config Update

# Запускаем каждые 30 минут
on:
  schedule:
    # Крон-выражение: "Минута Час ДеньМесяца Месяц ДеньНедели"
    - cron: '*/30 * * * *'
  # Разрешаем ручной запуск для отладки (появится кнопка в интерфейсе GitHub)
  workflow_dispatch:

jobs:
  update-configs:
    runs-on: ubuntu-latest
    steps:
      # 1. Загружаем код из нашего репозитория (чтобы скрипт был доступен)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Даём скрипту права на выполнение
      - name: Make script executable
        run: chmod +x ./scripts/update_happ.sh

      # 3. Запускаем наш главный скрипт
      - name: Run Happ auto-update script
        run: ./scripts/update_happ.sh

      # 4. (Опционально) Сохраняем скриншоты как артефакты, чтобы посмотреть, что происходило
      - name: Upload screenshots as artifacts
        uses: actions/upload-artifact@v4
        if: always() # Сохраняем артефакты, даже если скрипт упал с ошибкой
        with:
          name: happ-screenshots
          path: /tmp/happ-*.png
